function buildItems(){const box=$('itemsList');box.innerHTML='';itemsData.forEach(cat=>{const det=document.createElement('details');det.className='cat';det.innerHTML=`<summary>${cat.cat[lang]}</summary>`;cat.opts.forEach(([id,name,price])=>{const lab=document.createElement('label');lab.className='opt';lab.innerHTML=`<input type="checkbox" ${selected.has(id)?'checked':''}><span>${cat.cat[lang]} · ${name[lang]}</span><b>₪${price}</b>`;const inp=lab.querySelector('input');inp.onchange=()=>{inp.checked?selected.set(id,{cat:cat.cat[lang],name:name[lang],price}):selected.delete(id);render()};det.appendChild(lab)});box.appendChild(det)});const boxes=document.createElement('details');boxes.className='cat';boxes.innerHTML=`<summary>${lang==='he'?'ארגזים':lang==='en'?'Boxes':'Коробки'}</summary><div class="boxRow"><div class="field"><label>${lang==='he'?'כמות':lang==='en'?'Quantity':'Количество'}</label><select id="boxesCount">${[0,5,10,15,20,30,40,50,75,100].map(n=>`<option value="${n}" ${boxesCount===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field"><label>${lang==='he'?'מחיר':lang==='en'?'Price':'Цена'}</label><input value="auto" readonly></div></div>`;box.appendChild(boxes);$('boxesCount').onchange=e=>{boxesCount=Number(e.target.value||0);render()}}
function boxesPrice(n){if(n<=0)return 0;if(n<=10)return 30;if(n<=20)return 60;if(n<=30)return 90;if(n<=50)return 150;if(n<=100)return 300;return n*3}function calc(){let itemsSum=0;selected.forEach(x=>itemsSum+=x.price);itemsSum+=boxesPrice(boxesCount);const itemCount=selected.size+(boxesCount>0?Math.ceil(boxesCount/10):0);if(!itemCount)return{total:0,itemsSum:0,route:0,floors:0,hard:0,min:0,minApplied:false,itemCount:0};const cityA=$('cityA').value,cityB=$('cityB').value;const route=routePrice[cityA+'-'+cityB]??(cityA===cityB?80:250);const floorA=Number($('floorA').value||0),floorB=Number($('floorB').value||0);let rate=20;if(itemCount>=3)rate=50;if(itemCount>=6||itemsSum>=1500)rate=100;let floors=0;if(!$('liftA').checked)floors+=floorA*rate;if(!$('liftB').checked)floors+=floorB*rate;if(boxesCount>0){const noLift=(!$('liftA').checked?floorA:0)+(!$('liftB').checked?floorB:0);floors+=Math.round(boxesCount*noLift*2)}let hard=0;if($('hardA').checked)hard+=80;if($('hardB').checked)hard+=80;let raw=itemsSum+route+floors+hard;let min=300;if(route>=180)min=500;if(route>=400)min=700;if(itemCount>=3)min=Math.max(min,450);if(itemCount>=6)min=Math.max(min,600);const total=Math.max(raw,min);return{total,itemsSum,route,floors,hard,min,minApplied:total>raw,itemCount}}
function render(){const c=calc();$('total').textContent='₪'+c.total;$('note').textContent=c.itemCount?`${c.itemCount} ${T('positions')}`:T('choose');const picked=Array.from(selected.values()).map(x=>`${x.cat} · ${x.name}`);if(boxesCount>0)picked.push((lang==='he'?'ארגזים':lang==='en'?'Boxes':'Коробки')+' · '+boxesCount);$('chips').innerHTML=picked.length?picked.slice(0,6).map(x=>`<span class="chip">${x}</span>`).join('')+(picked.length>6?`<span class="chip">+${picked.length-6}</span>`:''):`<span class="chip">${T('nothingSelected')}</span>`;$('breakdown').textContent=c.itemCount?`${T('breakdown')}: ${lang==='he'?'פריטים':lang==='en'?'Items':'Вещи'} ₪${c.itemsSum} · ${lang==='he'?'מסלול':lang==='en'?'Route':'Маршрут'} ₪${c.route} · ${lang==='he'?'קומות':lang==='en'?'Floors':'Этажи'} ₪${c.floors}${c.minApplied?' · '+T('minApplied')+' ₪'+c.min:''}`:'—'}
function applyLang(){document.documentElement.lang=lang;document.documentElement.dir=lang==='he'?'rtl':'ltr';$('appTitle').innerHTML=T('title');$('appSub').textContent=T('sub');$('langBtn').textContent=lang.toUpperCase();document.querySelectorAll('[data-t]').forEach(el=>{el.textContent=T(el.dataset.t)});$('toast').textContent=T('copied');fillCities();fillFloors();buildItems();render()}function cycleLang(){lang=langs[(langs.indexOf(lang)+1)%langs.length];applyLang()}function clearCalc(){selected.clear();boxesCount=0;$('addrA').value='';$('addrB').value='';$('floorA').value='0';$('floorB').value='0';$('liftA').checked=true;$('liftB').checked=true;$('hardA').checked=false;$('hardB').checked=false;buildItems();render()}
function quoteText(){const c=calc();const picked=Array.from(selected.values()).map(x=>'• '+x.cat+' · '+x.name);if(boxesCount>0)picked.push('• '+(lang==='he'?'ארגזים':lang==='en'?'Boxes':'Коробки')+' · '+boxesCount);return `${T('calcTitle')}\n\n${T('moveDate')}: ${$('moveDate').value||'-'} ${$('moveTime').value||''}\n\n${T('from')}:\n${cityName($('cityA').value)}${$('addrA').value?', '+$('addrA').value:''}\n${T('floor')}: ${$('floorA').value}\n${T('lift')}: ${$('liftA').checked?T('yes'):T('no')}\n${T('hard')}: ${$('hardA').checked?T('yes'):T('no')}\n\n${T('to')}:\n${cityName($('cityB').value)}${$('addrB').value?', '+$('addrB').value:''}\n${T('floor')}: ${$('floorB').value}\n${T('lift')}: ${$('liftB').checked?T('yes'):T('no')}\n${T('hard')}: ${$('hardB').checked?T('yes'):T('no')}\n\n${T('itemList')}:\n${picked.join('\n')||'—'}\n\n${T('breakdown')}:\n${lang==='he'?'פריטים':lang==='en'?'Items':'Вещи'}: ₪${c.itemsSum}\n${lang==='he'?'מסלול':lang==='en'?'Route':'Маршрут'}: ₪${c.route}\n${lang==='he'?'קומות':lang==='en'?'Floors':'Этажи'}: ₪${c.floors}\n${c.minApplied?T('minApplied')+': ₪'+c.min+'\n':''}${T('approx')}: ₪${c.total}\n\n${T('reason')}\n\n${T('link')}:\n${APP_URL}`}
function copyCalc(){navigator.clipboard?.writeText(quoteText());$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1400)}function shareApp(){const text=`ProfiClick\n${T('shareText')}: ${APP_URL}`;if(navigator.share)navigator.share({title:'ProfiClick',text,url:APP_URL}).catch(()=>{});else{navigator.clipboard?.writeText(text);$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1400)}}if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}init();
</script></body></html>
