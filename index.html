function setDefaultDate(){ const d = new Date(); d.setDate(d.getDate()+1); $("moveDate").value = d.toISOString().slice(0,10); }
function fillCities(){ const vals = {cityA:$("cityA").value || "haifa", cityB:$("cityB").value || "netanya"}; for(const id of ["cityA","cityB"]){ const s=$(id); s.innerHTML=""; cities.forEach(([v,n])=>s.add(new Option(n[lang],v))); s.value = vals[id] || (id==="cityA"?"haifa":"netanya");}}
function floorZeroLabel(){
  if(lang==="en") return "0 / house";
  if(lang==="he") return "0 / בית";
  return "0 / дом";
}
function fillFloors(){
  for(const id of ["floorA","floorB"]){
    const old = $(id).value || "0";
    const s=$(id); s.innerHTML="";
    for(let i=0;i<=30;i++) s.add(new Option(i===0 ? floorZeroLabel() : String(i),String(i)));
    s.value=old;
  }
}
function selectOption(cat,id,name,price){
  cat.opts.forEach(([oid])=>selected.delete(oid));
  selected.set(id,{key:cat.key,catObj:cat.cat,nameObj:name,price});
  render(); buildItems();
  $("sheetBg").classList.remove("show");
  setTimeout(()=>$("calcCard").scrollIntoView({behavior:"smooth",block:"start"}),50);
}
function buildItems(){
  const box=$("itemsList"); box.innerHTML="";
  itemsData.forEach(cat=>{
    const det=document.createElement("details"); det.className="cat"; det.dataset.key=cat.key;
    const chosen = Array.from(selected.values()).find(x=>x.key===cat.key);
    det.innerHTML=`<summary>${cat.cat[lang]}${chosen ? '<span class="chosen">✓ '+(chosen.nameObj ? chosen.nameObj[lang] : chosen.name)+' · ₪'+chosen.price+'</span>' : ""}</summary>`;
    cat.opts.forEach(([id,name,price])=>{
      const active = selected.has(id);
      const lab=document.createElement("div"); lab.className="opt"+(active?" active":"");
      lab.innerHTML=`<span class="checkMark"></span><span>${name[lang]}</span><b>₪${price}</b>`;
      lab.addEventListener("click",()=>selectOption(cat,id,name,price));
      det.appendChild(lab);
    });
    box.appendChild(det);
  });
  const boxes=document.createElement("details"); boxes.className="cat";
  boxes.innerHTML=`<summary>${T("boxes")}${boxesCount ? '<span class="chosen">✓ '+boxesCount+' · ₪'+boxesPrice(boxesCount)+'</span>' : ""}</summary>
    <div class="boxControl">
      <div class="stepper">
        <button type="button" id="boxMinus">−</button>
        <div class="num"><span id="boxNum">${boxesCount}</span><br><small>${T("quantity")} · ₪${boxesPrice(boxesCount)}</small></div>
        <button type="button" id="boxPlus">+</button>
      </div>
    </div>`;
  box.appendChild(boxes);
  $("boxMinus").onclick=()=>{boxesCount=Math.max(0,boxesCount-5); render(); buildItems(); if(boxesCount>0){$("sheetBg").classList.remove("show"); setTimeout(()=>$("calcCard").scrollIntoView({behavior:"smooth",block:"start"}),50);}};
  $("boxPlus").onclick=()=>{boxesCount=Math.min(100,boxesCount+5); render(); buildItems(); $("sheetBg").classList.remove("show"); setTimeout(()=>$("calcCard").scrollIntoView({behavior:"smooth",block:"start"}),50);};
}
function boxesPrice(n){ if(n<=0)return 0; if(n<=10)return 50; if(n<=20)return 100; if(n<=30)return 150; if(n<=50)return 250; if(n<=100)return 500; return n*5; }
function calc(){
  let itemsSum=0; selected.forEach(x=>itemsSum+=x.price); itemsSum += boxesPrice(boxesCount);
  const itemCount = selected.size + (boxesCount>0 ? Math.ceil(boxesCount/10) : 0);
  if(itemCount===0) return {total:0, itemsSum:0, route:0, floors:0, hard:0, min:0, minApplied:false, itemCount:0};
  const cityA=$("cityA").value, cityB=$("cityB").value;
  const route = routePrice[cityA+"-"+cityB] ?? (cityA===cityB ? 80 : 250);
  const floorA=Number($("floorA").value||0), floorB=Number($("floorB").value||0);
  let rate = 40; if(itemCount>=3) rate=80; if(itemCount>=6 || itemsSum>=1500) rate=120;
  let floors=0; if(!$("liftA").checked) floors += floorA*rate; if(!$("liftB").checked) floors += floorB*rate;
  if(boxesCount>0){ const noLiftFloors = (!$("liftA").checked?floorA:0)+(!$("liftB").checked?floorB:0); floors += Math.round(boxesCount*noLiftFloors*2);}
  let hard=0; if($("hardA").checked) hard+=80; if($("hardB").checked) hard+=80;
  let raw = itemsSum + route + floors + hard;

  // Simple real-world minimums:
  // local job: minimum call-out ₪250
  // nearby city: moderate minimum
  // long city-to-city: higher minimum
  let min = 250;
  if(route >= 180) min = 500;
  if(route >= 350) min = 750;
  if(route >= 600) min = 1000;

  // For multiple items, raise the minimum gently, but do not overinflate local jobs.
  if(itemCount >= 3) min = Math.max(min, cityA===cityB ? 650 : 900);
  if(itemCount >= 6) min = Math.max(min, cityA===cityB ? 900 : 1200);

  const total=Math.max(raw,min); return {total,itemsSum,route,floors,hard,min,minApplied:total>raw,itemCount};
}
function removeSelected(id){ selected.delete(id); render(); buildItems(); }
function render(){
  const c=calc(); $("total").textContent="₪"+c.total; $("note").textContent = c.itemCount ? `${c.itemCount} ${T("positions")}` : T("choose");
  const tags=$("pickedTags"); tags.innerHTML="";
  const picked=Array.from(selected.entries());
  if(!picked.length && boxesCount===0){ tags.innerHTML=`<span class="empty">${T("nothingSelected")}</span>`; }
  picked.forEach(([id,x])=>{ const cn=x.catObj?x.catObj[lang]:x.cat; const nn=x.nameObj?x.nameObj[lang]:x.name; tags.innerHTML += `<span class="tag">✓ ${cn} · ${nn} · ₪${x.price}<button class="x" onclick="removeSelected('${id}')">×</button></span>`; });
  if(boxesCount>0){ tags.innerHTML += `<span class="tag">✓ ${T("boxes")} · ${boxesCount} · ₪${boxesPrice(boxesCount)}<button class="x" onclick="boxesCount=0;render();buildItems()">×</button></span>`; }
  $("breakdown").textContent = c.itemCount ? `${T("breakdown")}: ${T("itemsWord")} ₪${c.itemsSum} · ${T("routeWord")} ₪${c.route} · ${T("floorsWord")} ₪${c.floors}${c.minApplied ? " · "+T("minApplied")+" ₪"+c.min : ""}` : "—";
}
function applyLang(){ document.documentElement.lang=lang; document.documentElement.dir=lang==="he"?"rtl":"ltr"; $("appTitle").innerHTML=T("title"); $("appSub").textContent=T("sub"); $("langBtn").textContent=lang.toUpperCase(); document.querySelectorAll("[data-t]").forEach(el=>{el.textContent=T(el.dataset.t);}); $("toast").textContent=T("copied"); fillCities(); fillFloors(); buildItems(); render();}
function cycleLang(){ lang=langs[(langs.indexOf(lang)+1)%langs.length]; applyLang(); }
function clearCalc(){ selected.clear(); boxesCount=0; $("addrA").value=""; $("addrB").value=""; $("floorA").value="0"; $("floorB").value="0"; $("liftA").checked=true; $("liftB").checked=true; $("hardA").checked=false; $("hardB").checked=false; buildItems(); render();}
function orderId(){
  const d = new Date();
  return "PC-" + d.getFullYear().toString().slice(2) + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0") + "-" + String(d.getHours()).padStart(2,"0") + String(d.getMinutes()).padStart(2,"0");
}
function quoteText(){
  const c=calc();
  const picked=Array.from(selected.values()).map(x=>"• "+(x.catObj?x.catObj[lang]:x.cat)+" · "+(x.nameObj?x.nameObj[lang]:x.name)+" · ₪"+x.price);
  if(boxesCount>0)picked.push("• "+T("boxes")+" · "+boxesCount+" · ₪"+boxesPrice(boxesCount));
  const id = orderId();
  const respondUrl = APP_URL + "?order=" + encodeURIComponent(id);
  const a = `${cityName($("cityA").value)}${$("addrA").value ? ", "+$("addrA").value : ""}`;
  const b = `${cityName($("cityB").value)}${$("addrB").value ? ", "+$("addrB").value : ""}`;

  if(lang==="en"){
    return `🚚 *ProfiClick moving request*
#${id} · ${$("moveDate").value || "-"} · ${$("moveTime").value || ""}

📍 A: ${a}
Floor ${$("floorA").value} · Elevator ${$("liftA").checked ? "yes" : "no"} · ${$("hardA").checked ? "difficult access" : "normal access"}

📍 B: ${b}
Floor ${$("floorB").value} · Elevator ${$("liftB").checked ? "yes" : "no"} · ${$("hardB").checked ? "difficult access" : "normal access"}

📦 Items: ${picked.length}
${picked.slice(0,6).join("\n")}${picked.length>6 ? "\n• +" + (picked.length-6) + " more" : ""}

💰 *Approx. price: ₪${c.total}*

Open / respond:
${respondUrl}`;
  }

  if(lang==="he"){
    return `🚚 *בקשת הובלה ProfiClick*
#${id} · ${$("moveDate").value || "-"} · ${$("moveTime").value || ""}

📍 א׳: ${a}
קומה ${$("floorA").value} · מעלית ${$("liftA").checked ? "כן" : "לא"} · ${$("hardA").checked ? "גישה קשה" : "גישה רגילה"}

📍 ב׳: ${b}
קומה ${$("floorB").value} · מעלית ${$("liftB").checked ? "כן" : "לא"} · ${$("hardB").checked ? "גישה קשה" : "גישה רגילה"}

📦 פריטים: ${picked.length}
${picked.slice(0,6).join("\n")}${picked.length>6 ? "\n• +" + (picked.length-6) : ""}

💰 *מחיר משוער: ₪${c.total}*

פתיחה / מענה:
${respondUrl}`;
  }

  return `🚚 *ProfiClick — заявка на перевозку*
#${id} · ${$("moveDate").value || "-"} · ${$("moveTime").value || ""}

📍 A: ${a}
Этаж ${$("floorA").value} · Лифт ${$("liftA").checked ? "да" : "нет"} · ${$("hardA").checked ? "сложный доступ" : "обычный доступ"}

📍 B: ${b}
Этаж ${$("floorB").value} · Лифт ${$("liftB").checked ? "да" : "нет"} · ${$("hardB").checked ? "сложный доступ" : "обычный доступ"}

📦 Вещи: ${picked.length}
${picked.slice(0,6).join("\n")}${picked.length>6 ? "\n• +" + (picked.length-6) + " ещё" : ""}

💰 *Примерная цена: ₪${c.total}*

Открыть заказ / откликнуться:
${respondUrl}`;
}

function copyCalc(){
  navigator.clipboard?.writeText(quoteText());
  const t = $("toast");
  t.innerHTML = `<div>✅ ${T("copied")}</div><button class="toastAction" type="button" onclick="sendWhatsApp()"><span class="waCircle">☎</span>${T("sendWa") || "WhatsApp"}</button>`;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),5000);
}
function sendWhatsApp(){
  const url = "https://wa.me/?text=" + encodeURIComponent(quoteText());
  window.location.href = url;
}
function shareApp(){ const text=`ProfiClick\n${T("shareText")}: ${APP_URL}`; if(navigator.share) navigator.share({title:"ProfiClick",text,url:APP_URL}).catch(()=>{}); else {navigator.clipboard?.writeText(text); $("toast").classList.add("show"); setTimeout(()=>$("toast").classList.remove("show"),1400);}}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
init();
</script>
